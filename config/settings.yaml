symbols:
  deribit:
    - instrument: BTC-PERPETUAL
      symbol: BTC
    - instrument: ETH-PERPETUAL
      symbol: ETH
    - instrument: SOL_USDC-PERPETUAL
      symbol: SOL
  vix: "^VIX"

collector:
  resolution: 60              # candle interval in minutes (1h = 60)
  history_days: 1800          # 5-year backfill window in days

storage:
  raw_dir: data/raw                       # Parquet output directory
  models_dir: data/processed/models       # fitted model artefacts
  processed_dir: data/processed           # forecast charts and backtest outputs

options:
  max_pain_days_ahead: 30         # long window for Max Pain mean (calendar days)
  max_pain_days_ahead_short: 7    # short window for Max Pain mean (calendar days)

hmm:
  n_components: [5]           # fixed: Strong Bearish / Bearish / Neutral / Bullish / Strong Bullish
  n_splits: 5                 # TimeSeriesSplit folds
  n_trials: 200               # Optuna trials
  random_state: 42            # seed for GaussianHMM and Optuna TPESampler
  covariance_type: full       # hmmlearn covariance type (full/diag/tied/spherical)
  n_iter: 200                 # max EM iterations per fit

backtest:
  min_train_days: 30         # minimum training window per fold
  step_days: 7               # walk-forward step size (weekly)
  horizon_hours: 24          # forecast horizon per fold

  # Option B: one entry per named variant — all run in one backtest pass
  strategy_variants:
    hourly:
      discrete_trading: null   # stündliche Evaluation, 24/7
      trading_window: null
      trailing_stop_pct: null
      long_only: false

    discrete_stop10:
      discrete_trading: [3, 6] # 3h weak / 6h strong, 24/7
      trading_window: null
      trailing_stop_pct: 10    # stop bei −10 % vom Trade-Einstieg
      long_only: false

    long_only_stop3:
      discrete_trading: [3, 6] # 3h/6h, nur Long-Einsteige
      trading_window: null
      trailing_stop_pct: 3     # stop bei −3 % vom Trade-Einstieg
      long_only: true          # Bearish/Neutral → flat halten, kein Short

    hmm_xgb_gated:             # Option C: HMM position × XGB direction × persistence
      discrete_trading: null   # stündlich; Skalierung durch Composite Gate
      trading_window: null
      trailing_stop_pct: null
      long_only: false
      xgb_gated: true          # aktiviert XGB-Richtungs-Gate + HMM-Persistenz-Gate

    discrete_stop10_gated:     # discrete_stop10 + Option C Gate
      discrete_trading: [3, 6]
      trading_window: null
      trailing_stop_pct: 10
      long_only: false
      xgb_gated: true

    long_only_stop3_gated:     # long_only_stop3 + Option C Gate
      discrete_trading: [3, 6]
      trading_window: null
      trailing_stop_pct: 3
      long_only: true
      xgb_gated: true

    # Top-3 Blöcke aus Timing-Analyse: 00–03, 06–09, 15–18 UTC (~37% der Stunden)
    discrete_gated_timed:      # discrete_stop10 + Gate + Timing-Filter
      discrete_trading: [3, 6]
      trailing_stop_pct: 10
      long_only: false
      xgb_gated: true
      allowed_hours: [0, 1, 2, 6, 7, 8, 15, 16, 17]

    long_only_gated_timed:     # long_only_stop3 + Gate + Timing-Filter
      discrete_trading: [3, 6]
      trailing_stop_pct: 3
      long_only: true
      xgb_gated: true
      allowed_hours: [0, 1, 2, 6, 7, 8, 15, 16, 17]

iv_skew:
  days_ahead: 14              # BTC options expiring within N days for skew computation

neuralprophet:
  ensemble_seeds: [0, 42, 99, 137, 256]   # Seeds für Ensemble-Training
  xgb_anchor_hours: 6                      # Erste N Stunden als XGB-Anker für Seed-Gewichtung
  n_forecasts: 24                           # direkt auf 24h-Horizont spezialisiert (kein 48h-Puffer mehr)
  hmm_regime_probs: true                    # HMM-State-Wahrscheinlichkeiten als Regressoren

logging:
  level: INFO
